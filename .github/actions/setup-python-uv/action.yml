###############################################################################
# Composite action: setup-python-uv
#
# Encapsulates the three-step boilerplate used in every job that needs Python:
#   1. Set up Python from .python-version
#   2. Set up uv
#   3. Cache ~/.cache/uv keyed on pyproject.toml
#   4. Install dependencies (uv sync --extra dev)
#
# Usage:
#   - uses: ./.github/actions/setup-python-uv
#     with:
#       install-deps: "true"   # optional, default true
###############################################################################

name: "Set up Python + uv"
description: "Installs Python (from .python-version), sets up uv, and optionally syncs dependencies."

inputs:
  install-deps:
    description: "Run uv sync --extra dev after setup"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python from .python-version
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version-file: ".python-version"

    - name: Set up uv
      uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v6.1.0

    - name: Cache uv dependency store
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: uv-${{ runner.os }}-

    - name: Install dependencies
      if: ${{ inputs.install-deps == 'true' }}
      shell: bash
      run: uv sync --extra dev
