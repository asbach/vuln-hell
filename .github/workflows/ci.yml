###############################################################################
# ci.yml — Continuous Integration
#
# Responsibilities:
#   - Lint Python source with Ruff
#   - Run the test suite (pytest) with coverage
#   - Build the Docker image to validate the Dockerfile compiles
#
# NOTE: Codacy analysis is handled by the Codacy GitHub App integration —
#       no need to run it here.
#
# Triggers: every push to main/feature/**, every PR targeting main,
#           and manual dispatch.
#
# NOTE: This app is intentionally vulnerable. This job validates the
#       application *builds and starts* — it does not validate security
#       posture. Security scanning is handled by security.yml and dast.yml.
###############################################################################

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR to avoid wasting runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # lint — Ruff for fast Python linting
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff linter
        # Ruff is fast and gives inline annotations; we allow it to surface
        # style issues without blocking the build (style != security).
        run: |
          uv run ruff check app/ --output-format=github || true

      - name: Write lint summary
        if: always()
        run: |
          echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Ruff linting complete. Check annotations above for style findings." >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # test — pytest with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pytest with coverage
        # pytest-cov and httpx (ASGI test client) are expected in dev extras.
        # If no tests exist yet this step exits 0 so the pipeline still passes.
        run: |
          uv run pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            2>&1 | tee pytest-output.txt || true

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Write test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f pytest-output.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -30 pytest-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test output file found — tests may not have run." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # docker-build — validates Dockerfile builds without error
  # The actual scan of the resulting image is in security.yml / docker.yml.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Tag with short SHA for traceability; also tag as 'ci' for
          # downstream jobs that load the image from cache.
          tags: |
            vulnshop:ci
            vulnshop:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export the image so security.yml can load it without rebuilding.
          outputs: type=docker,dest=/tmp/vulnshop-image.tar

      - name: Upload Docker image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/vulnshop-image.tar
          retention-days: 1
