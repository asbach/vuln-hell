version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      # CKV_SECRET: hardcoded secrets in compose file
      - SECRET_KEY=supersecretkey123
      - ADMIN_PASSWORD=admin123
      - JWT_SECRET=secret123
      - DATABASE_URL=sqlite:///./vulnerable.db
    volumes:
      # Dangerous bind-mount: exposes host root filesystem inside container
      - /:/host:ro
    # CKV2_DC_2: privileged mode — full host capabilities
    privileged: true
    # No resource limits (CKV2_DC_1)
    # No healthcheck (CKV_DOCKER_2)
    restart: always
